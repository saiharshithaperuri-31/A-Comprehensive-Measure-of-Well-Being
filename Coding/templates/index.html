<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Human Development Index Prediction</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="header">

<h1>🌍 Human Development Index</h1>

<p>
Predict a country's Human Development category using
Health, Education and Income indicators.
</p>

</div>


<form action="/predict" method="POST">

<div class="input-group">

<label>❤️ Life Expectancy at Birth</label>

<input
type="number"
step="any"
name="life_expectancy"
placeholder="Example : 84"
required>

</div>


<div class="input-group">

<label>🎓 Expected Years of Schooling</label>

<input
type="number"
step="any"
name="expected_schooling"
placeholder="Example : 16.5"
required>

</div>


<div class="input-group">

<label>📚 Mean Years of Schooling</label>

<input
type="number"
step="any"
name="mean_schooling"
placeholder="Example : 13.9"
required>

</div>


<div class="input-group">

<label>💰 Gross National Income (GNI)</label>

<input
type="number"
step="any"
name="gni"
placeholder="Example : 66933"
required>

</div>


<button>

Predict Human Development

</button>

</form>


{% if prediction %}

<div class="result">

{{ prediction }}

</div>

{% endif %}

</div>

</body>

</html>
